name: MiniMax Code Review

on:
  pull_request:
    branches: [master, dev]
    types: [opened]
  workflow_dispatch:
    inputs:
      review_rounds:
        description: "Number of review rounds"
        required: false
        default: "2"
        type: string
      model:
        description: "MiniMax model to use"
        required: false
        default: "MiniMax-M2.7"
        type: string
      fix_until_success:
        description: "Loop until all bugs are fixed (ignore ROUNDS)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ai-builder-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MINIMAX_API_URL: https://api.minimax.io/anthropic
  DIFF_MAX_LINES: "2000"
  API_TIMEOUT_SECONDS: "120"
  API_MAX_RETRIES: "3"
  API_RETRY_DELAY: "30"
  DEFAULT_FIX_ROUNDS: "10"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_feature_branch: ${{ steps.validate.outputs.is_feature_branch }}
      pr_number: ${{ steps.pr_metadata.outputs.pr_number }}
      base_branch: ${{ steps.pr_metadata.outputs.base_branch }}
      commit_count: ${{ steps.pr_metadata.outputs.commit_count }}
      run_id: ${{ github.run_id }}
    steps:
      - name: Validate feature branch
        id: validate
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^feat/.* ]]; then
            echo "::notice::Skipping — not a feature branch"
            echo "is_feature_branch=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_feature_branch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.validate.outputs.is_feature_branch == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR metadata
        if: steps.validate.outputs.is_feature_branch == 'true'
        id: pr_metadata
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            core.setOutput('pr_number', pr.number.toString());
            core.setOutput('base_branch', pr.base.ref);
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            core.setOutput('commit_count', commits.length.toString());

      - name: Generate diff (smart filter)
        if: steps.validate.outputs.is_feature_branch == 'true'
        id: diff
        run: |
          BASE_BRANCH="origin/${{ steps.pr_metadata.outputs.base_branch }}"
          # Prioritize important files, filter out test/snap files
          git diff "$BASE_BRANCH" --diff-filter=AM \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' \
            ':!*.test.*' ':!e2e/**' ':!*.spec.*' ':!*.snap' \
            > pr_diff.patch || echo "" > pr_diff.patch

          DIFF_LINES=$(wc -l < pr_diff.patch | tr -d ' ')
          echo "Diff lines: $DIFF_LINES"
          if [ "$DIFF_LINES" -gt ${{ env.DIFF_MAX_LINES }} ]; then
            echo "::warning::Diff truncated to ${{ env.DIFF_MAX_LINES }} lines"
            head -n ${{ env.DIFF_MAX_LINES }} pr_diff.patch > pr_diff.truncated.patch
            mv pr_diff.truncated.patch pr_diff.patch
          fi

      - name: Persist PR number for review job
        if: steps.validate.outputs.is_feature_branch == 'true'
        run: |
          echo "PR_NUMBER=${{ steps.pr_metadata.outputs.pr_number }}" >> "$GITHUB_ENV"

  review:
    needs: setup
    if: needs.setup.outputs.is_feature_branch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    outputs:
      all_rounds_complete: ${{ steps.review_loop.outputs.all_rounds_complete }}
      changes_requested: ${{ steps.review_loop.outputs.changes_requested }}
      review_summary: ${{ steps.review_loop.outputs.review_summary }}
      review_rounds: ${{ steps.review_loop.outputs.review_rounds }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore diff
        id: restore_diff
        env:
          BASE_BRANCH: ${{ needs.setup.outputs.base_branch }}
        run: |
          git diff "origin/$BASE_BRANCH" --diff-filter=AM \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' \
            ':!*.test.*' ':!e2e/**' ':!*.spec.*' ':!*.snap' \
            > pr_diff.patch || echo "" > pr_diff.patch

      - name: Run MiniMax Review Loop
        id: review_loop
        env:
          ROUNDS: ${{ github.event.inputs.review_rounds || '2' }}
          MODEL: ${{ github.event.inputs.model || 'MiniMax-M2.7' }}
          BASE_BRANCH: ${{ needs.setup.outputs.base_branch }}
          COMMIT_COUNT: ${{ needs.setup.outputs.commit_count }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          RUN_ID: ${{ needs.setup.outputs.run_id }}
        run: python3 .github/scripts/review_loop.py

      - name: Upload AI review logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-logs-${{ github.run_number }}
          path: /tmp/review_output.log
          retention-days: 7

  auto-fix:
    needs: [setup, review]
    if: needs.setup.outputs.is_feature_branch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      all_fixed: ${{ steps.fix_loop.outputs.all_fixed }}
      fix_rounds: ${{ steps.fix_loop.outputs.fix_rounds }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          if [ -f 'playwright.config.ts' ] || [ -f 'playwright.config.js' ]; then
            npx playwright install --with-deps chromium
          fi

      - name: Run MiniMax Fix Loop
        id: fix_loop
        env:
          ROUNDS: ${{ github.event.inputs.review_rounds || env.DEFAULT_FIX_ROUNDS }}
          FIX_UNTIL_SUCCESS: ${{ github.event.inputs.fix_until_success || 'false' }}
          MODEL: ${{ github.event.inputs.model || 'MiniMax-M2.7' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OUTPUT: ${{ github.output_path }}
        run: python3 .github/scripts/fix_loop.py

      - name: Upload AI fix logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-fix-logs-${{ github.run_number }}
          path: /tmp/fix_output.log
          retention-days: 7

  reporter:
    needs: [setup, review, auto-fix]
    if: always() && needs.setup.outputs.is_feature_branch == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post AI Activity Report
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ needs.setup.outputs.pr_number }}';
            const reviewRounds = '${{ needs.review.outputs.review_rounds }}';
            const fixRounds = '${{ needs.auto-fix.outputs.fix_rounds }}' || '0';

            let md = `### 🤖 AI Activity Report\n\n`;
            md += `- **Review Rounds**: ${reviewRounds}\n`;
            md += `- **Auto-Fix Rounds**: ${fixRounds}\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber)
            });

            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('AI Activity Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: md
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: md
              });
            }

  auto-commit:
    needs: [setup, review, auto-fix]
    if: needs.setup.outputs.is_feature_branch == 'true' && (needs.auto-fix.outputs.all_fixed == 'true' || needs.review.outputs.changes_requested != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create approval commit
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            SUMMARY='${{ needs.review.outputs.review_summary }}'
            ROUNDS='${{ needs.review.outputs.review_rounds }}'
            git commit -m "ci: MiniMax code review approved [skip ci] - (${ROUNDS} rounds) - ${SUMMARY:0:200}" -m "Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin '${{ github.head_ref }}'
            echo "Approval commit pushed"
          fi
