name: Merge-forward skill branches

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write

jobs:
  merge-forward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge master into each feat branch
        id: merge
        run: |
          FAILED=""
          SUCCEEDED=""

          # List all remote feat branches
          mapfile -t FEAT_BRANCHES < <(git branch -r --list 'origin/feat/*' | sed 's|origin/||' | tr -d ' ')

          if [ -z "$FEAT_BRANCHES" ]; then
            echo "No feat branches found."
            exit 0
          fi

          for BRANCH in "${FEAT_BRANCHES[@]}"; do
            FEAT_NAME=$(echo "$BRANCH" | sed 's|feat/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            # Checkout the feat branch
            git checkout -B "$BRANCH" "origin/$BRANCH"

            # Attempt merge
            if ! git merge master --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort || true
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with master."
              SUCCEEDED="$SUCCEEDED $FEAT_NAME"
              continue
            fi

            # Install deps and validate
            bun install

            if ! bun run format:check; then
              echo "::warning::Format check failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            if ! bun run type-check; then
              echo "::warning::Type check failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            if ! bun run test; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            # Push the updated branch
            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $FEAT_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          # Export for issue creation
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for failed merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const sha = context.sha.substring(0, 7);
            const body = [
              `The merge-forward workflow failed to merge \`master\` (${sha}) into the following feat branches:`,
              '',
              ...failed.map(s => `- \`feat/${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout feat/${s}`,
                `git merge master`,
                '# resolve conflicts, then: git push',
                ''
              ]).flat(),
              '```',
              '',
              `Triggered by push to master: ${context.sha}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} feat branch(es) after ${sha}`,
              body,
              labels: ['maintenance']
            });
